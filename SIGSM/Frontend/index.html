<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión</title>
    <link rel="stylesheet" href="/TriAxisTechnologies-Proyecto2026/SIGSM/Frontend/style/style-index.css">
</head>

<body>

    <div class="container">

        <!-- Encabezado azul -->
        <header class="top-bar">

            <div class="logo-area">
                <img src="/TriAxisTechnologies-Proyecto2026/SIGSM/Frontend/assets/img/HospitalDeClinicas.png" alt="Logo"
                    class="logo">
            </div>

            <div class="title-area">
                <h1>Inicio<br>de<br>sesión</h1>
            </div>

        </header>

        <!-- Caja del formulario -->
        <div class="login-box">

            <p class="ruta">Inicio de sesión</p>

            <form class="login-form">

                <label>Cédula</label>
                <input type="text" placeholder="12345678">

                <label>Contraseña</label>
                <input type="password" placeholder="********">

                <button type="submit" class="login-button">
                    INICIAR SESIÓN
                </button>

            </form>

        </div>

    </div>

</body>

</html>
