<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
        href="/TriAxisTechnologies-Proyecto2026/SIGSM/Frontend/style/style-CreacionDeUsuarioAdministrativo.css">
    <title>Creación de Usuario Administrativo</title>
</head>

<body>
    <header class="header">

        <div class="logo-container">
            <img src="/TriAxisTechnologies-Proyecto2026/SIGSM/Frontend/assets/img/HospitalDeClinicas.png" alt="Logo"
                class="logo">

            <div class="buttons">
                <a href="/TriAxisTechnologies-Proyecto2026/SIGSM/Frontend/html/PanelAdministrativo.html"
                    class="btnPanel">Panel administrativo</a>
                <a href="/TriAxisTechnologies-Proyecto2026/SIGSM/Frontend/html/TransportedeVehiculos.html"
                    class="btnAmbulancias">Gestion de ambulancias</a>
                <a href="/TriAxisTechnologies-Proyecto2026/SIGSM/Frontend/html/CreacionDeUsuarioAdministrativo.html"
                    class="btnUsuario">Crear usuario administrativo</a>
            </div>
        </div>

        <div class="titulo">
            <h1>Creación de Usuario Administrativo</h1>
        </div>

    </header>
    <div class="form-container">
        <form action="" class="login">
            <h3 class="login-title">Ingrese los datos</h3>

            <label for="" class="login-label">Cédula</label>
            <input type="number" class="login-label" placeholder="1234567">

            <label for="" class="login-label">Nombre</label>
            <input type="text" class="login-user" placeholder="">

            <label for="" class="login-label">Contraseña</label>
            <input type="password" class="login-password" placeholder="******">

            <label for="" class="login-label">Repetir contraseña</label>
            <input type="password" class="login-rep-password" placeholder="******">

            <button type="submit" class="login-button">Crear usuario</button>
            <div class="link">
            </div>
        </form>
    </div>

    <footer class="footer">
        <p>© 2026 TriAxis Technologies. Todos los derechos reservados.</p>
    </footer>
</body>

</html>
