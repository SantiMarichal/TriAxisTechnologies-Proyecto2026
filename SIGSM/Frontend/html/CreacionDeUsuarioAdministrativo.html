<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style/style-CreacionDeUsuarioAdministrativo.css">
    <link rel="icon" href="../assets/icons/HospitalDeClinicas.ico">
    <title>Creación de Usuario Administrativo</title>
</head>

<body>
    <header class="header">
        <div class="logo-container">
            <img src="../assets/img/HospitalDeClinicas.png" alt="Logo" class="logo">
        </div>

        <div class="titulo">
            <h1>Creación de Usuario Administrativo</h1>
        </div>

    </header>
    <div class="layout">
        <aside class="sidebar">
            <ul class="menu">
                <a href="../html/TransportedeVehiculos.html">
                    <li class="menu-item">
                        Gestión de ambulancias
                    </li>
                </a>
                <a href="../html/PanelAdministrativo.html">
                    <li class="menu-item">
                        Panel administrativo
                    </li>
                </a>
            </ul>
        </aside>
        <div class="form-container">
            <form action="" class="login">
                <h3 class="login-title">Ingrese los datos</h3>

                <label for="" class="login-label">Cédula</label>
                <input type="number" class="login-label" placeholder="1234567">

                <label for="" class="login-label">Nombre</label>
                <input type="text" class="login-user" placeholder="">

                <label for="" class="login-label">Contraseña</label>
                <input type="password" class="login-password" placeholder="******">

                <label for="" class="login-label">Repetir contraseña</label>
                <input type="password" class="login-rep-password" placeholder="******">

                <button type="submit" class="login-button">Crear usuario</button>
            </form>
        </div>
    </div>
    <footer class="footer">
        <p>© 2026 TriAxis Technologies. Todos los derechos reservados.</p>
    </footer>
</body>

</html>
