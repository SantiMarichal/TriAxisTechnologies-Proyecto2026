<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
        href="/TriAxisTechnologies-Proyecto2026/SIGSM/Frontend/style/style-CreacionDeUsuarioAdministrativo.css">
    <title>Creación de Usuario Administrativo</title>
</head>

<body>
    <div class="header">
        <img src="/TriAxisTechnologies-Proyecto2026/SIGSM/Frontend/assets/img/HospitalDeClinicas.png" class="logo">
    </div>
    <div class="form-container">
        <form action="" class="login">
            <h1 class="login-title">Creación de Usuario Administrativo</h1>

            <label for="" class="login-label">Cédula</label>
            <input type="number" class="login-label" placeholder="1234567">

            <label for="" class="login-label">Nombre</label>
            <input type="text" class="login-user" placeholder="">

            <label for="" class="login-label">Contraseña</label>
            <input type="password" class="login-password" placeholder="******">

            <label for="" class="login-label">Repetir contraseña</label>
            <input type="password" class="login-rep-password" placeholder="******">

            <button type="submit" class="login-button">Crear usuario</button>
            <div class="link">
            </div>
        </form>
    </div>
</body>

</html>
