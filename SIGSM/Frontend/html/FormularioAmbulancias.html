<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style/style-FormularioAmbulancias.css">
    <link rel="icon" href="../assets/icons/HospitalDeClinicas.ico">
    <title>Formulario Ambulancias</title>
</head>

<body>
    <header class="header">
        <div class="logo-container">
            <img src="../assets/img/HospitalDeClinicas.png" alt="Logo" class="logo">
        </div>
        <div class="titulo">
            <h1>Solicitud de Traslado</h1>
        </div>
    </header>
    <main class="main-container">
        <div class="form-container">
            <form action="" class="ambulancia">
                <h3 class="ambulancia-title">Ingrese los datos de la ambulancia</h3>

                <label for="" class="login-label">Cédula del paciente</label>
                <input type="text" class="ambulancia-label" placeholder="Maria Perez">

                <label for="" class="login-label">Nombre del chofer</label>
                <input type="text" class="ambulancia-label" placeholder="Pepe Perez">

                <label for="" class="login-label">Nombre del enfermero</label>
                <input type="text" class="ambulancia-label" placeholder="Julian Perez">

                <label for="" class="login-label">Hora de salida</label>
                <input type="text" class="ambulancia-label" placeholder="7:00">

                <label for="" class="login-label">Hora de llegada estimada</label>
                <input type="text" class="ambulancia-label" placeholder="8:30">

                <label for="" class="login-label">Telefono</label>
                <input type="text" class="ambulancia-label" placeholder="094585292">

                <label for="" class="login-label">¿Precisa oxigeno?</label>
                <select class="camilla">
                    <option>Sí</option>
                    <option>No</option>
                </select>

                <label for="" class="login-label">Tipo de camilla</label>
                <select class="camilla">
                    <option>Camilla de emergencia</option>
                    <option>Camilla de traslado</option>
                </select>

                <button type="submit" class="crear-button">Crear solicitud de traslado</button>
                <a href="../html/TransportedeVehiculos.html" class="volver">Volver a Transporte de Vehículos</a>
            </form>
        </div>
</body>

</html>
