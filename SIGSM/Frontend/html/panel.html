<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel administrativo</title>
    <link rel="icon" href="/TriAxisTechnologies-Proyecto2026/SIGSM/Frontend/assets/icons/HospitalDeClinicas.ico">
    <link rel="stylesheet" href="/TriAxisTechnologies-Proyecto2026/SIGSM/Frontend/style/style-panel.css">
</head>

<body>

    <!-- contenedor principal -->
    <div class="contenedor">

        <!-- encabezado -->
        <header>

            <img src="/TriAxisTechnologies-Proyecto2026/SIGSM/Frontend/assets/img/HospitalDeClinicas.png" alt="logo">

            <h1>Hospital de Clínicas</h1>

            <!-- botones -->
            <div class="botones">

                <button>Panel Admin</button>

                <button class="ambulancia">
                    Ambulancias
                </button>

            </div>

        </header>

        <!-- contenido -->
        <main>

            <!-- caja del formulario -->
            <section class="carga">

                <h2>Panel Administrativo</h2>

                <p>
                    Gestión de documentación del Hospital de Clínicas.
                </p>

                <h3>Cargar nuevo documento</h3>

                <form>

                    <label>Nombre del documento</label>
                    <input type="text">

                    <label>Descripción</label>

                    <!-- textarea para textos largos -->
                    <textarea></textarea>

                    <label>Categoría</label>

                    <select>
                        <option>Laboratorio</option>
                        <option>Emergencia</option>
                    </select>

                    <button class="subir">
                        Cargar documento
                    </button>

                </form>

            </section>

            <!-- documentos -->
            <section class="documentos">

                <h3>Documentos cargados</h3>

                <div class="card">

                    <h4>protocolo</h4>

                    <p>Proyecto descripción</p>

                    <div class="etiquetas">

                        <span class="azul">
                            Categoría
                        </span>

                        <span class="verde">
                            Aprobado
                        </span>

                    </div>

                </div>

            </section>

        </main>

        <!-- pie -->
        <footer>

            <p>
                Hospital de Clínicas - Sistema de Documentación Digital
            </p>

        </footer>

    </div>

</body>

</html>
